llm:
  model: "Qwen/Qwen2.5-14B-Instruct"
  backend: "transformers" # Options: "vllm", "transformers", "openai"
  quantization: "4bit" # For transformers backend: "4bit", "8bit", None
  max_tokens: 4096
  temperature: 0.7
  api_base: "http://localhost:8000/v1" # vllm or openai base url
  api_key: null  # Load from OPENAI_API_KEY env var. Never commit real keys here.

agent:
  max_steps: 15
  max_searches_per_question: 3
  max_reflection_loops: 3
  
tools:
  search_provider: "ddg" # Options: "tavily", "ddg" — set TAVILY_API_KEY in .env to use Tavily
  search_max_results: 5
  scrape_timeout: 15
  
memory:
  vector_db: "chromadb"
  embedding_model: "BAAI/bge-m3" # State-of-the-art embedding model for premium local research
  chunk_size: 512
  chunk_overlap: 50

logging:
  trace_dir: "logs/traces"
  wandb_project: "autonomous-researcher"

# Fine-Tuning Models Integration
fine_tuned:
  reviewer:
    enabled: true
    base_model: "Qwen/Qwen2.5-14B-Instruct"  # Target base model in adapter_config.json
    adapter_path: "reviewer lora"
  reranker:
    enabled: true
    model_path: "reranker model"

